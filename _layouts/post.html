---
layout: common
---

<h1 class="post-title">{{ page.title }}</h1>
<div class="post-date">{{ page.date | date_to_string }}</div>

<div class="post-tags">
{% if page.tags.size != 0 %}
  <a class="meta">tagged:{% for tag in page.tags %} {{ tag }}{% if forloop.last == false %},{% endif %}{% endfor %}</a>
{% endif %}
</div>

<article class="post">
  {{ content }}
</article>
